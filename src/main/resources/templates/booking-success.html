<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #e8f5e9;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-card {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
            background: #fff;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .success-icon {
            font-size: 50px;
            color: green;
        }

        .booking-id {
            font-weight: bold;
            color: #198754;
        }
    </style>
</head>

<body>

<div class="success-card">

    <div class="success-icon">✅</div>

    <h2 class="mt-3">Booking Confirmed!</h2>

    <p>Your hotel booking has been successfully done.</p>

    <p><strong>Booking ID:</strong> 
        <span class="booking-id" th:text="${bookingId}"></span>
    </p>

    <hr>

    <p><strong>Room Type:</strong>
       <span th:text="${roomType}"></span>   
    </p>
      
    <p><strong>Check-in:</strong> 
        <span th:text="${checkIn}"></span>
    </p>

    <p><strong>Check-out:</strong> 
        <span th:text="${checkOut}"></span>
    </p>

    <a href="/home" class="btn btn-primary mt-3">Go to Home</a>
    
    <hr>

        <p><strong>Price per night:</strong> ₹ 
          <span th:text="${price}"></span>
        </p>

        <p><strong>Total Nights:</strong> 
           <span th:text="${days}"></span>
        </p>

        <p><strong>Total Price:</strong> ₹ 
            <span th:text="${totalPrice}"></span>
        </p>

</div>

</body>
</html>
