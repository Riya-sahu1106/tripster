<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Account</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }

        .container {
            display: flex;
            max-width: 1100px;
            margin: 40px auto;
            gap: 30px;
        }

        /* LEFT SIDEBAR */
        .sidebar {
            width: 250px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #333;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #e6f0ff;
        }

        .active {
            background: #4facfe;
            color: white;
        }

        /* RIGHT CONTENT */
        .content {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #4facfe;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }

        .profile-info h2 {
            margin: 0;
        }

        .profile-info p {
            margin: 5px 0;
            color: gray;
        }

        .box {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .label {
            font-weight: 600;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #3a8be0;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Account</h3>
        <a href="/profile" class="active">Personal Info</a>
        <a href="/my-bookings">My Bookings</a>
        <a href="/myReviews">Reviews</a>
        <a href="/saved">Saved</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div th:if="${user != null}">

            <!-- PROFILE HEADER -->
            <div class="profile-header">
                <div class="avatar">
                    <span th:text="${user.name.substring(0,1)}"></span>
                </div>

                <div class="profile-info">
                    <h2 th:text="${user.name}"></h2>
                    <p th:text="${user.email}"></p>
                </div>
            </div>

            <!-- DETAILS -->
            <div class="box">
                <span class="label">Name</span>
                <span th:text="${user.name}"></span>
            </div>

            <div class="box">
                <span class="label">Email</span>
                <span th:text="${user.email}"></span>
            </div>

            <a href="/edit-profile">
              <button class="btn">Edit Profile</button>
            </a>

        </div>

    </div>

</div>

</body>
</html>
