<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .payment-card {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .info {
            font-size: 16px;
            margin: 10px 0;
        }

        .amount-box {
            background: #f1f8ff;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        .btn-pay {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            font-size: 18px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="payment-card">

    <h2>💳 Payment Page</h2>

    <p class="info">Check-in: <span th:text="${checkIn}"></span></p>
    <p class="info">Check-out: <span th:text="${checkOut}"></span></p>

    <!-- Amount Display -->
    <div class="amount-box">
        Total Amount: ₹ <span th:text="${totalAmount}"></span>
    </div>

    <form action="/payment/success" method="post">
        
        <input type="hidden" name="hotelId" th:value="${hotelId}">
        <input type="hidden" name="checkIn" th:value="${checkIn}">
        <input type="hidden" name="checkOut" th:value="${checkOut}">
        <input type="hidden" name="totalAmount" th:value="${totalAmount}">

        <button type="submit" class="btn btn-primary btn-pay">
            Pay Now
        </button>
    </form>

</div>

</body>
</html>
