<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">My Bookings</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Hotel</th>
            <th>Location</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Total Price</th>
            <th>Status</th>
            <th>Action</th>
            <th>Receipt</th> 
            <th>Room Type</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="b : ${bookings}">
            <td th:text="${b.hotel.name}"></td>
            <td th:text="${b.hotel.location}"></td>
            <td th:text="${b.checkIn}"></td>
            <td th:text="${b.checkOut}"></td>
            <td th:text="${b.totalPrice}"></td>
            <td>
                <span th:if="${b.status == 'CONFIRMED'}" style="color:green;font-weight:bold">✅ Confirmed</span>
                <span th:if="${b.status == 'CANCELLED'}" style="color:red;font-weight:bold">❌ Cancelled</span>
                <span th:if="${b.status == null}" style="color:green;font-weight:bold">✅ Confirmed</span>
            </td>
            
            <td>
                <form th:if="${b.status != 'CANCELLED'}" th:action="@{/cancel-booking}" method="post"
                      onsubmit="return confirm('Cancel this booking?')">
                    <input type="hidden" name="bookingId" th:value="${b.id}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
                </form>
               <span th:if="${b.status == 'CANCELLED' and b.cancelDate != null 
                    and T(java.time.LocalDate).now().isBefore(b.cancelDate.plusDays(5))}"
                    class="text-muted" style="font-size:12px">
                    Refund in 5-7 days
               </span>

               <span th:if="${b.status == 'CANCELLED' and b.cancelDate != null 
                    and T(java.time.LocalDate).now().isAfter(b.cancelDate.plusDays(5))}"
                    style="color:green;font-weight:bold;font-size:12px">
                    ✅ Refund Completed
               </span>
            </td>
            <td>                                           <!-- YAHAN ADD KARO -->
                <a th:href="@{/download-receipt/{id}(id=${b.id})}"
                   class="btn btn-sm btn-outline-primary">
                    Download Receipt
                </a>
             </td>
             <td th:text="${b.roomType != null ? b.roomType : 'N/A'}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
