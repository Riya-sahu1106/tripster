<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Success</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e8f5e9, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: #28a745;
        }

        .title {
            margin-top: 10px;
            font-weight: bold;
        }

        .details {
            text-align: left;
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .details p {
            margin: 5px 0;
        }

        .amount {
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
            margin-top: 10px;
        }

        .btn-home {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }

        .success-card:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<div class="success-container">
    <div class="success-card">

        <div class="success-icon">✅</div>
        <h2 class="title">Payment Successful!</h2>
        <p>Your booking is confirmed 🎉</p>

        <!-- Booking Details -->
        <div class="details">
            <p><strong>Hotel Name:</strong> <span th:text="${hotelName}"></span></p>
            <p><strong>Check-in:</strong> <span th:text="${checkIn}"></span></p>
            <p><strong>Check-out:</strong> <span th:text="${checkOut}"></span></p>
        </div>

        <!-- Amount -->
        <div class="amount">
            Total Paid: ₹ <span th:text="${totalAmount}"></span>
        </div>

        <!-- Button -->
        <a href="/home" class="btn btn-success btn-home">
            Back to Home
        </a>

    </div>
</div>

</body>
</html>
