<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container-fluid {
            height: 100vh;
        }

        /* Left Image */
        .left-side {
                background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
                height: 100vh;
                   }
        /* Right Form */
        .right-side {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8f9fa;
        }

        .login-box {
    width: 350px;
    margin: auto;
    text-align: center;
}

        .login-box h3 {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .login-btn {
            width: 100%;
            border-radius: 25px;
        }

        .signup-link {
            margin-top: 10px;
            display: block;
            text-align: center;
        }
        
        .brand {
    text-align: center;
    font-size: 38px;
    font-weight: bold;
    margin-bottom: 15px;

    /* premium look */
    background: linear-gradient(to right, #4facfe, #00f2fe);
    -webkit-background-clip: text;
    color: transparent;
}

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT IMAGE -->
        <div class="col-md-7 left-side"></div>

        <!-- RIGHT FORM -->
        <div class="col-md-5 right-side">

            <div class="login-box">
            
               <h2 class="brand">Tripster</h2>
                 
                <h3 class="text-center">Log In</h3>
                <div th:if="${emailError}" class="alert alert-danger" th:text="${emailError}"></div>
                
                <form action="/login" method="post">

                    <input type="text" name="gmail" class="form-control" placeholder="gmail">

                    <input type="password" name="password" class="form-control" placeholder="Password">

                    <button class="btn btn-primary login-btn">Log In</button>

                </form>
                
                <div class="text-center mt-2">
                    <a href="/forgot-password" style="font-size:13px; color:#0d6efd;">
                      Forgot Password?
                    </a>
                </div>

                <a href="/signup" class="signup-link">
                    Don't have an account? Sign up
                </a>

            </div>

        </div>

    </div>
</div>

</body>
</html>
