<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #4facfe, #00f2fe); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 40px; border-radius: 16px;
               width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .brand { font-size: 32px; font-weight: bold; text-align: center;
                 background: linear-gradient(to right, #4facfe, #00f2fe);
                 -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body>
<div class="box">
    <div class="brand">Tripster</div>
    <h5 class="text-center mt-2 mb-4">Set New Password</h5>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/reset-password" method="post">
        <div class="mb-3">
            <label>New Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Minimum 6 characters" required>
        </div>
        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" class="form-control"
                   placeholder="Re-enter password" required>
        </div>
        <button class="btn btn-success w-100">Reset Password</button>
    </form>
</div>
</body>
</html>
