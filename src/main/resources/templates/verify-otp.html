<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #4facfe, #00f2fe); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 40px; border-radius: 16px;
               width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .brand { font-size: 32px; font-weight: bold; text-align: center;
                 background: linear-gradient(to right, #4facfe, #00f2fe);
                 -webkit-background-clip: text; color: transparent; }
        .otp-input { font-size: 24px; letter-spacing: 8px; text-align: center; }
    </style>
</head>
<body>
<div class="box">
    <div class="brand">Tripster</div>
    <h5 class="text-center mt-2 mb-2">Enter OTP</h5>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <p class="text-muted text-center" style="font-size:13px;">
        Check your email for the 6-digit OTP. Valid for 15 minutes.
    </p>

    <form action="/verify-otp" method="post">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control otp-input"
                   placeholder="_ _ _ _ _ _" maxlength="6" required>
        </div>
        <button class="btn btn-primary w-100">Verify OTP</button>
    </form>

    <div class="text-center mt-3">
        <a href="/forgot-password">Resend OTP</a>
    </div>
</div>
</body>
</html>
