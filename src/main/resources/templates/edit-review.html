<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Review</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #e6f0ff;
        }

        .card {
            border-radius: 15px;
        }

        .stars input {
            display: none;
        }

        .stars label {
            font-size: 25px;
            color: lightgray;
            cursor: pointer;
        }

        .stars input:checked ~ label {
            color: gold;
        }

        .stars label:hover,
        .stars label:hover ~ label {
            color: gold;
        }
    </style>
</head>

<body>

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow p-4" style="width: 500px;">

        <h3 class="text-center mb-4">✏️ Edit Your Review</h3>

        <form th:action="@{/reviews/update}" method="post">

            <!-- Hidden -->
            <input type="hidden" name="id" th:value="${review.id}" />
            <input type="hidden" name="hotel.id" th:value="${review.hotel.id}" />

            <!-- ⭐ Rating -->
            <label class="form-label">Rating:</label>
            <input type="number" class="form-control mb-3"
                   name="rating" min="1" max="5"
                   th:value="${review.rating}" required>

            <!-- 💬 Comment -->
            <label class="form-label">Comment:</label>
            <textarea class="form-control mb-3"
                      name="comment"
                      rows="4"
                      placeholder="Write your experience..."
                      th:text="${review.comment}"></textarea>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <a th:href="@{/hotel/{id}(id=${review.hotel.id})}" 
                   class="btn btn-secondary">Cancel</a>

                <button type="submit" class="btn btn-primary">
                    Update Review
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
