<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to right, #e3f2fd, #ffffff); font-family: 'Segoe UI', sans-serif; }
        .booking-card {
            width: 100%; max-width: 480px; margin: 80px auto;
            padding: 30px; border-radius: 15px;
            background: #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .booking-title { text-align: center; font-weight: bold; margin-bottom: 25px; }
        .btn-book { width: 100%; padding: 10px; border-radius: 10px; font-size: 16px; }
        .back-btn { width: 100%; margin-top: 10px; }
        .room-option {
            border: 2px solid #dee2e6; border-radius: 10px;
            padding: 12px 15px; margin-bottom: 10px; cursor: pointer;
        }
        .room-option:hover { border-color: #0d6efd; background: #f0f7ff; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2 class="booking-title">🏨 Book Your Stay</h2>
    <h5 class="text-center text-muted mb-4" th:text="${hotel.name}"></h5>

  <!-- Date error -->
   <div th:if="${dateError}" class="alert alert-danger" th:text="${dateError}"></div>

<!-- Duplicate booking error -->
   <div th:if="${duplicateError}" class="alert alert-warning" th:text="${duplicateError}"></div>

  <form th:action="@{/confirmBooking}" method="Post">

        <input type="hidden" name="hotelId" th:value="${hotel.id}">

        <!-- Check-in -->
        <div class="mb-3">
            <label class="form-label fw-semibold">📅 Check-in Date</label>
            <input type="date" name="checkIn" class="form-control"
            th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" 
       required>
        </div>

        <!-- Check-out -->
        <div class="mb-3">
            <label class="form-label fw-semibold">📅 Check-out Date</label>
            <input type="date" name="checkOut" class="form-control" 
            th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" 
            required>
        </div>
        

        <!-- Room Type — Radio buttons, koi JS nahi -->
        <div class="mb-4">
            <label class="form-label fw-semibold">🛏️ Select Room Type</label>

            <div class="room-option">
                <input type="radio" name="roomType" value="SINGLE" id="single" required>
                <label for="single" style="cursor:pointer; width:100%;">
                    🛏️ <strong>Single Room</strong>
                    <span class="text-muted ms-2">₹ <span th:text="${hotel.singlePrice}"></span> / night</span>
                </label>
            </div>

            <div class="room-option">
                <input type="radio" name="roomType" value="DOUBLE" id="double">
                <label for="double" style="cursor:pointer; width:100%;">
                    🛏️🛏️ <strong>Double Room</strong>
                    <span class="text-muted ms-2">₹ <span th:text="${hotel.doublePrice}"></span> / night</span>
                </label>
            </div>

            <div class="room-option">
                <input type="radio" name="roomType" value="SUITE" id="suite">
                <label for="suite" style="cursor:pointer; width:100%;">
                    👑 <strong>Suite</strong>
                    <span class="text-muted ms-2">₹ <span th:text="${hotel.suitePrice}"></span> / night</span>
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-book">
            Confirm Booking
        </button>
        <a href="/home" class="btn btn-outline-secondary back-btn">Back to Hotels</a>

    </form>
</div>

</body>
</html>
