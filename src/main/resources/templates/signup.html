<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up</title>

    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container-fluid {
            height: 100vh;
        }

        /* Left Image */
        .left-side {
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
            height: 100vh;
        }

        /* Right Form */
        .right-side {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8f9fa;
        }

        .signup-box {
            width: 350px;
            margin: auto;
            text-align: center;
        }

        .brand {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            color: transparent;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .signup-btn {
            width: 100%;
            border-radius: 25px;
        }

        .login-link {
            margin-top: 10px;
            display: block;
            text-align: center;
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT IMAGE -->
        <div class="col-md-7 left-side"></div>

        <!-- RIGHT FORM -->
        <div class="col-md-5 right-side">

            <div class="signup-box">

                <h2 class="brand">Tripster</h2>

                <h3>Create Account</h3>

                
                <form action="/signup" method="post" th:object="${user}">

                    <input type="text" th:field="*{name}" class="form-control" placeholder="Full Name">
                     <span th:if="${#fields.hasErrors('name')}" style="color:red; font-size:13px;">
                     Name 2 characters se chhota nahi hona chahiye
                     </span>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email">
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                    style="color:red; font-size:13px; display:block; margin-top:-10px; text-align:left;">
                    </span>

                    <input type="password" th:field="*{password}" class="form-control" placeholder="Password">
                    <span th:if="${#fields.hasErrors('password')}" style="color:red; font-size:13px;">
                     Password minimum 6 characters ka hona chahiye
                    </span>
                    <button class="btn btn-success signup-btn">Sign Up</button>

                </form>

                <a href="/login" class="login-link">
                    Already have an account? Login
                </a>

            </div>

        </div>

    </div>
</div>

</body>
</html>
