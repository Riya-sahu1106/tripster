<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>

    <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container {
        width: 420px;
        margin: 80px auto;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
        color: #333;
    }

    label {
        display: block;
        text-align: left;
        margin-top: 10px;
        font-weight: 600;
        color: #555;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: linear-gradient(to right, #4facfe, #00c6ff);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(to right, #3a8be0, #00aaff);
    }

    .back-btn {
        display: inline-block;
        margin-top: 15px;
        text-decoration: none;
        color: #4facfe;
        font-size: 14px;
    }

    .back-btn:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Edit Profile</h2>

    <form action="/update-profile" method="post">

        <input type="hidden" name="id" th:value="${user.id}" />

        <label>Name</label>
        <input type="text" name="name" th:value="${user.name}" required />

        <button type="submit">Update</button>

    </form>
</div>

</body>
</html>
